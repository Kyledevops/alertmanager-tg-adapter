version: '3'
services:
  tg-adapter:
    image: us-harbor.aiaipool.com/devops/alert-tg-adapter:v1.0
    pull_policy: always
    container_name: tg-adapter
    restart: always
    ports:
      - "9087:9087"
    volumes:
      - ./config.yml:/app/config.yml  # Mount config file
    environment:
      - CONFIG_FILE=/app/config.yml
      # Environment variables can still override config.yml values if set here
      # - TELEGRAM_TOKEN=${TELEGRAM_TOKEN} 
      # - CHAT_ID=${CHAT_ID}
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9087/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
